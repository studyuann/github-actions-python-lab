name: 02 Python Run Workflow

on:
  push:
    branches:
      - 'main'

jobs:
  run-python:
    runs-on: ubuntu-latest  # run-python 아래로 2칸 들여쓰기

    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4

      - name: python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python 버전 확인
        run: python --version

      - name: Python 파일 실행
        # 파일명이 app.py라면 수정이 필요할 수 있습니다 (아래 주의사항 참고)
        run: python app.py 

      - name: 파일 목록 확인
        # Ubuntu 환경에서는 ll 대신 ls -al을 사용하는 것이 안전합니다.
        run: ls -al